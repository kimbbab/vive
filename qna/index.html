<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실시간 채팅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="chat-app">
      <header id="chat-toolbar" class="chat-toolbar">
        <a id="back-link" class="toolbar-link" href="../">발표</a>
        <button id="mode-toggle" class="toolbar-link" type="button">준비자료</button>
      </header>

      <section id="question-list" class="question-list" aria-live="polite"></section>

      <form id="question-form" class="composer">
        <textarea
          id="content"
          name="content"
          rows="2"
          maxlength="500"
          placeholder="채팅 입력"
          required
        ></textarea>
        <button id="submit-button" class="send-button" type="submit">입력</button>
        <p id="form-message" class="form-message" aria-live="polite"></p>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./seed-answers.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
