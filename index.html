<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>발표</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="presentation-shell" aria-label="발표">
        <header class="presentation-topbar">
          <nav class="top-nav" id="top-nav" aria-label="슬라이드 이동"></nav>
          <div class="stage-actions">
            <button id="prev-slide" class="stage-button" type="button" aria-label="이전 슬라이드">
              이전
            </button>
            <p id="slide-counter" class="slide-counter" aria-live="polite"></p>
            <button id="next-slide" class="stage-button" type="button" aria-label="다음 슬라이드">
              다음
            </button>
          </div>
        </header>

        <main id="slides" class="slides" aria-live="polite"></main>
      </section>

      <aside class="chat-shell" aria-label="채팅">
        <div class="chat-frame-wrap">
          <iframe id="chat-frame" class="chat-frame" title="채팅 패널" loading="lazy"></iframe>
        </div>
      </aside>
    </div>

    <script src="./content/presentation-data.js"></script>
    <script src="./scripts/main.js"></script>
  </body>
</html>
